<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅방</title>
  <style>
    @font-face {
      font-family: "GMarketSans";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansLight.woff") format("woff");
      font-weight: 300;
      font-display: swap;
    }

    @font-face {
      font-family: "GMarketSans";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff") format("woff");
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "GMarketSans";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff") format("woff");
      font-weight: 700;
      font-display: swap;
    }

    body {
      font-family: GMarketSans;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 0.5rem;
    }

    #users {
      width: 250px;
      border-left: 1px solid #ccc;
      padding: 0.5rem;
    }

    #emojiBox {
      display: none;
      border: 1px solid #ccc;
      padding: 0.5rem;
      position: absolute;
      background: white;
    }

    #emojiBox span {
      cursor: pointer;
      padding: 0.3rem;
    }

    .system-msg {
      color: gray;
      font-style: italic;
    }

    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: green;
      margin-right: 5px;
    }

    .chat-container {
      display: flex;
      flex: 1;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat,
    .chat-container,
    .chat-main {
      min-height: 0;
    }

    #users {
      width: 250px;
      border-left: 1px solid #ccc;
      padding: 0.75rem;
      background: #f9fafb;
      font-size: 0.85rem;
    }

    #users h4 {
      margin: 0 0 0.5rem;
    }

    #userCounts {
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      border-radius: 6px;
      background: beige;
      border: 1px solid #e5e7eb;
      line-height: 1.4;
    }

    #userCounts strong {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.8rem;
    }

    #userList>div {
      padding: 0.25rem 0.2rem;
      border-bottom: 1px dashed #e5e7eb;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    #userList>div:last-child {
      border-bottom: none;
    }

    #userList>div:hover {
      background: #f3f4f6;
    }

    #userList strong {
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <div id="chat">
    <h3 id="channelName"></h3>
    <div class="chat-container">
      <div class="chat-main">
        <div id="messages"></div>
        <div>
          <input type="text" id="to" placeholder="귓속말 대상(없으면 전체)">
          <input type="text" id="message" placeholder="메시지를 입력하세요">
          <select id="channelSelector">
            <option value="lobby">대기실</option>
            <option value="sports">스포츠</option>
            <option value="programming">프로그래밍</option>
            <option value="music">음악</option>
          </select>
          <button id="emoji">😀</button>
          <button id="send">전송</button>
        </div>
      </div>
      <div id="users">
        <h4>접속자 목록</h4>
        <div id="userCounts"></div>
        <div id="userList"></div>
      </div>
    </div>
    <div id="emojiBox">
      <span>😁</span>
      <span>😂</span>
      <span>🤣</span>
      <span>😃</span>
      <span>😆</span>
      <span>😎</span>
      <span>😐</span>
      <span>😑</span>
      <span>🙄</span>
      <span>😣</span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    console.log("클라이언트 소켓 생성 성공!")

    const nickname = localStorage.getItem("nickname")
    let currentChannel = localStorage.getItem("channel")

    if (!nickname || !currentChannel) {
      alert("닉네임 또는 채널 정보가 없습니다")
      location.href = "chat_index.html"
    }

    const channelName = document.getElementById("channelName")
    channelName.textContent = `[채널: ${currentChannel}]`

    const channelSelector = document.getElementById("channelSelector")
    channelSelector.value = currentChannel

    const messageInput = document.getElementById("message")
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage()
    })

    const toInput = document.getElementById("to")
    document.getElementById("send").onclick = sendMessage
    function sendMessage() {
      const text = messageInput.value.trim()
      const to = toInput.value.trim()
      if (text) {
        // chat 이벤트를 서버로 발생시킴
        socket.emit("chat", { text, to: to || null })
        messageInput.value = ""
      }
    }

    channelSelector.onchange = () => {
      const newChannel = channelSelector.value
      if (newChannel !== currentChannel) {
        socket.emit("changeChannel", { newChannel })
        currentChannel = newChannel
        channelName.textContent = `[채널: ${currentChannel}]`
        messages.innerHTML = ""
        localStorage.setItem("channel", currentChannel)
      }
    }

    const emojiBox = document.getElementById("emojiBox")
    const emojiBtn = document.getElementById("emoji")
    emojiBtn.onclick = () => {
      emojiBox.style.display = emojiBox.style.display === 'block' ? "none" : "block"
      emojiBox.style.top = emojiBtn.offsetTop - 50 + "px"
      emojiBox.style.left = emojiBtn.offsetLeft + 0 + "px"
    }

    emojiBox.querySelectorAll("span").forEach((span) => {
      span.onclick = () => {
        messageInput.value += span.textContent
        emojiBox.style.display = "none"
      }
    })


    // join 이벤트를 서버로 발생시킴
    socket.emit("join", { nickname, channel: currentChannel })

    const messages = document.getElementById("messages")
    // 서버에서 message 이벤트가 왔다면
    socket.on("message", ({ user, text }) => {
      console.log("user: ", user, "text: ", text)
      const div = document.createElement("div")   // <div></div>
      div.textContent = `[${user}] ${text}`   // <div>[system] 김사과님이 입장했습니다.</div>
      if (user === "system") div.className = "system-msg"
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    })

    // 서버에서 whisper 이벤트가 왔다면
    socket.on("whisper", ({ user, text }) => {
      const div = document.createElement("div")
      div.textContent = `(귓속말) [${user}] ${text}`
      div.style.color = "deeppink"
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    })

    const users = document.getElementById("userList")
    const userCounts = document.getElementById("userCounts")
    socket.on("userList", (list) => {
      users.innerHTML = ""
      const channelMap = {}

      list.forEach(({ nickname, channel }) => {
        if(!channelMap[channel]) channelMap[channel] = 0
        channelMap[channel]++
        
        if (channel !== currentChannel) return
        
        const div = document.createElement("div")
        div.innerHTML = `<span class="online-dot"></span><strong>${nickname}</strong>`
        users.appendChild(div)
        div.onclick = () => {
          if(toInput.value === nickname) {
            toInput.value = ""
          }else{
            toInput.value = nickname
          }
        }
      })

      userCounts.innerHTML = "<strong>채널별 접속자 수</strong><br>" + 
        Object.entries(channelMap).map(([ch, count]) => `${ch}: ${count}명`).join("<br>")
    })
  </script>
</body>

</html>
